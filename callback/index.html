<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Authorization</title>
<style>
  body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
  .card { background: white; border-radius: 12px; padding: 40px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); text-align: center; max-width: 500px; }
  .code { background: #f0f0f0; border: 2px solid #333; border-radius: 8px; padding: 16px; font-family: monospace; font-size: 14px; word-break: break-all; margin: 20px 0; user-select: all; }
  .success { color: #2e7d32; }
  .error { color: #c62828; }
  button { background: #fe2c55; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; }
  button:hover { background: #e5284d; }
</style>
</head>
<body>
<div class="card" id="card">
  <h1>Loading...</h1>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');
  const card = document.getElementById('card');

  if (code) {
    card.innerHTML = `
      <h1 class="success">Authorization Successful!</h1>
      <p>Copy the code below and paste it into the terminal:</p>
      <div class="code" id="code">${code}</div>
      <button onclick="navigator.clipboard.writeText('${code}').then(()=>this.textContent='Copied!')">Copy Code</button>
      <p style="margin-top:20px;color:#888;">You can close this tab after pasting.</p>
    `;
  } else if (error) {
    const desc = params.get('error_description') || error;
    card.innerHTML = `<h1 class="error">Authorization Failed</h1><p>${desc}</p>`;
  } else {
    card.innerHTML = `<h1 class="error">No authorization code received</h1>`;
  }
</script>
</body>
</html>
